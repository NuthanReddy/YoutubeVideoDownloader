name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: YouTubeVideoDownloader-windows
            artifact_path: dist/windows/YouTubeVideoDownloader.exe
          - os: macos-latest
            artifact_name: YouTubeVideoDownloader-macos
            artifact_path: dist/macos/YouTubeVideoDownloader.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --group build

      - name: Run tests
        run: uv run pytest

      - name: Build desktop app
        run: uv run --group build python scripts/build_desktop_app.py

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

      - name: Zip macOS app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist/macos
          ditto -c -k --sequesterRsrc --keepParent YouTubeVideoDownloader.app YouTubeVideoDownloader.app.zip

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macos/YouTubeVideoDownloader.app.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: YouTubeVideoDownloader-windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: YouTubeVideoDownloader-macos
          path: release-assets/macos

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/YouTubeVideoDownloader.exe
            release-assets/macos/YouTubeVideoDownloader.app.zip
