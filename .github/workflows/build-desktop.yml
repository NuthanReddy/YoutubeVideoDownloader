name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: YouTubeVideoDownloader-windows
            artifact_path: dist/windows/YouTubeVideoDownloader.exe
          - os: macos-latest
            artifact_name: YouTubeVideoDownloader-macos
            artifact_path: dist/macos/YouTubeVideoDownloader.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --group build

      - name: Run tests
        run: uv run pytest

      - name: Build desktop app
        run: uv run --group build python scripts/build_desktop_app.py

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

      - name: Zip macOS app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist/macos
          ditto -c -k --sequesterRsrc --keepParent YouTubeVideoDownloader.app YouTubeVideoDownloader.app.zip

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macos/YouTubeVideoDownloader.app.zip

