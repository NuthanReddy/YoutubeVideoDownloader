name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: YouTubeVideoDownloader-windows
          - os: macos-13
            artifact_name: YouTubeVideoDownloader-macos-intel
          - os: macos-14
            artifact_name: YouTubeVideoDownloader-macos-apple-silicon

    runs-on: ${{ matrix.os }}

    env:
      # Stamp the macOS bundle's minimum OS so it runs on macOS 12.x (Monterey).
      # Ignored on Windows.
      MACOSX_DEPLOYMENT_TARGET: "12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --group build

      - name: Run tests
        run: uv run pytest

      - name: Build desktop app
        run: uv run --group build python scripts/build_desktop_app.py

      # --- Windows: zip the onedir folder -------------------------------------
      - name: Zip Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/windows/YouTubeVideoDownloader `
            -DestinationPath dist/windows/${{ matrix.artifact_name }}.zip -Force

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/windows/${{ matrix.artifact_name }}.zip

      # --- macOS: zip the .app bundle (preserves symlinks & bundle layout) -----
      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist/macos
          ditto -c -k --sequesterRsrc --keepParent \
            YouTubeVideoDownloader.app ${{ matrix.artifact_name }}.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macos/${{ matrix.artifact_name }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/YouTubeVideoDownloader-windows/YouTubeVideoDownloader-windows.zip
            release-assets/YouTubeVideoDownloader-macos-intel/YouTubeVideoDownloader-macos-intel.zip
            release-assets/YouTubeVideoDownloader-macos-apple-silicon/YouTubeVideoDownloader-macos-apple-silicon.zip
