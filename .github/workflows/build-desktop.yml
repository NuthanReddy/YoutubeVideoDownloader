name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: YouTubeVideoDownloader-windows
          - os: macos-14
            artifact_name: YouTubeVideoDownloader-macos-apple-silicon
            target_arch: arm64
          - os: macos-14
            artifact_name: YouTubeVideoDownloader-macos-intel
            target_arch: x86_64

    runs-on: ${{ matrix.os }}

    env:
      # Stamp the macOS bundle's minimum OS so it runs on macOS 12.x (Monterey).
      # Ignored on Windows.
      MACOSX_DEPLOYMENT_TARGET: "12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Set up x86_64 Python via Rosetta (macOS Intel build)
        if: matrix.target_arch == 'x86_64'
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license
          uv python install cpython-3.12-macos-x86_64
          PYBIN="$(uv python find cpython-3.12-macos-x86_64)"
          echo "Selected interpreter: $PYBIN"
          file "$PYBIN"
          echo "UV_PYTHON=$PYBIN" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --group build

      - name: Run tests
        run: uv run pytest

      - name: Build desktop app
        run: uv run --group build python scripts/build_desktop_app.py

      - name: Verify macOS app architecture
        if: runner.os == 'macOS'
        run: |
          BIN="dist/macos/YouTubeVideoDownloader.app/Contents/MacOS/YouTubeVideoDownloader"
          echo "Expected arch: ${{ matrix.target_arch }}"
          file "$BIN"
          lipo -archs "$BIN"
          lipo -archs "$BIN" | grep -q "${{ matrix.target_arch }}"

      # --- Windows: zip the onedir folder -------------------------------------
      - name: Zip Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/windows/YouTubeVideoDownloader `
            -DestinationPath dist/windows/${{ matrix.artifact_name }}.zip -Force

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/windows/${{ matrix.artifact_name }}.zip

      # --- Windows: build a one-click installer with Inno Setup ----------------
      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found; installing via Chocolatey..."
            choco install innosetup -y --no-progress
          }
          if (-not (Test-Path $iscc)) {
            $found = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($found) { $iscc = $found.Source } else { throw "ISCC.exe not found after install" }
          }
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "(.*)"').Matches[0].Groups[1].Value
          Write-Host "Building installer version $ver using $iscc"
          & $iscc /DMyAppVersion=$ver installer\windows_installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Get-ChildItem dist\installer

      - name: Upload Windows installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: YouTubeVideoDownloader-windows-setup
          path: dist/installer/YouTubeVideoDownloader-Setup.exe

      # --- macOS: zip the .app bundle (preserves symlinks & bundle layout) -----
      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist/macos
          ditto -c -k --sequesterRsrc --keepParent \
            YouTubeVideoDownloader.app ${{ matrix.artifact_name }}.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macos/${{ matrix.artifact_name }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/YouTubeVideoDownloader-windows-setup/YouTubeVideoDownloader-Setup.exe
            release-assets/YouTubeVideoDownloader-windows/YouTubeVideoDownloader-windows.zip
            release-assets/YouTubeVideoDownloader-macos-intel/YouTubeVideoDownloader-macos-intel.zip
            release-assets/YouTubeVideoDownloader-macos-apple-silicon/YouTubeVideoDownloader-macos-apple-silicon.zip
